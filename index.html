<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExoMuse 外泌體精華｜人類來源外泌體保養品領導品牌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { DEFAULT: '#C9A96E', light: '#E8D5A8', dark: '#A68B4B', muted: '#D4C4A0' },
                        ivory: '#FDFBF7',
                        charcoal: '#1C1C1C',
                        'warm-gray': '#6B6560',
                        'pale-gold': '#F5EDE0',
                    },
                    fontFamily: { serif: ['Noto Serif TC','serif'], sans: ['Noto Sans TC','sans-serif'] }
                }
            }
        }
    </script>
    <style>
        html, body { font-family: 'Noto Sans TC', sans-serif; }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        .text-gold-gradient {
            background: linear-gradient(135deg, #A68B4B 0%, #E8D5A8 40%, #C9A96E 60%, #A68B4B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bg-gold-gradient { background: linear-gradient(135deg, #C9A96E 0%, #E8D5A8 50%, #C9A96E 100%); }
        .bg-luxury-dark { background: linear-gradient(180deg, #0F0F0F 0%, #1C1C1C 50%, #0F0F0F 100%); }
        .btn-gold { background: linear-gradient(135deg, #C9A96E, #A68B4B); color: #fff; transition: all .3s; }
        .btn-gold:hover { box-shadow: 0 8px 32px rgba(201,169,110,.35); transform: translateY(-1px); }
        .nav-glass { backdrop-filter: blur(24px) saturate(180%); }
    </style>
</head>
<body class="bg-ivory text-charcoal">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-ivory/80 nav-glass">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <a href="#" class="font-serif text-2xl font-bold tracking-widest text-gold-gradient">ExoMuse</a>
            <div class="hidden md:flex items-center gap-10 text-[.8rem] tracking-[.15em] uppercase text-warm-gray">
                <a href="#about" class="hover:text-charcoal transition-colors">品牌故事</a>
                <a href="#products" class="hover:text-charcoal transition-colors">產品系列</a>
                <a href="#ingredients" class="hover:text-charcoal transition-colors">核心成分</a>
            </div>
            <button onclick="toggleCart()" class="w-10 h-10 flex items-center justify-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            </button>
        </div>
    </nav>

    <section id="hero" class="relative min-h-screen flex items-center justify-center bg-luxury-dark text-white text-center px-6">
        <div class="max-w-4xl">
            <h1 class="font-serif text-5xl sm:text-6xl font-bold leading-tight mb-8">
                第一也是唯一<br>
                <span class="text-gold-gradient">合法人類來源</span><br>
                外泌體保養品
            </h1>
            <a href="#products" class="btn-gold px-12 py-4 rounded-full text-sm tracking-widest uppercase font-medium">探索產品</a>
        </div>
    </section>

    <section id="products" class="py-28 bg-ivory">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-center font-serif text-4xl font-bold mb-16">產品系列</h2>
            <div id="productGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <footer class="py-16 bg-luxury-dark text-white/30 text-center text-xs">
        © 2026 ExoMuse. All rights reserved.
    </footer>

    <div id="cartDrawer" class="fixed top-0 right-0 h-full w-96 bg-white z-[60] transform translate-x-full transition-transform p-6">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold">購物車</h3>
            <button onclick="toggleCart()">關閉</button>
        </div>
        <div id="cartItems" class="space-y-4"></div>
    </div>

    <script>
        const products = [
            { id: 'mask',     name: '人類外泌體面膜',   price: 1580, img: 'images/mask.jpg' },
            { id: 'essence',  name: '人類外泌體精華液', price: 3580, img: 'images/essence.jpg' },
            { id: 'ampoule',  name: '人類外泌體安瓶',   price: 3980, img: 'images/ampoule.jpg' },
            { id: 'hair',     name: '人類外泌體養髮液', price: 4580, img: 'images/hair.jpg' },
            { id: 'promo',    name: '節日促銷包',       price: 9980, img: 'images/brand.jpg' }
        ];

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-xl shadow-sm">
                    <img src="${p.img}" class="w-full h-64 object-cover mb-4">
                    <h3 class="font-bold mb-2">${p.name}</h3>
                    <p class="text-gold mb-4">NT$ ${p.price}</p>
                    <button class="w-full btn-gold py-2 rounded">加入購物車</button>
                </div>
            `).join('');
        }
        
        function toggleCart() {
            const d = document.getElementById('cartDrawer');
            d.classList.toggle('translate-x-full');
        }

        renderProducts();
    </script>
</body>
</html>
